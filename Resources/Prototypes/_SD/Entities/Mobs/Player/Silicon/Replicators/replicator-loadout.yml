# these are HEAVILY based on the Bingle free-agent ghostrole from GoobStation, but reflavored and reprogrammed to make them more Robust (and less of a meme.)
# all credit for the core gameplay concepts and a lot of the core functionality of the code goes to the folks over at Goob, but I re-wrote enough of it to justify putting it in our filestructure.
# the original Bingle PR can be found here: https://github.com/Goob-Station/Goob-Station/pull/1519

- type: entity
  id: ReplicatorT1Hitscan
  parent: BasicHitscan
  categories: [ HideSpawnMenu ]
  components:
    - type: HitscanBasicDamage
      damage:
        types:
          Shock: 10
    - type: HitscanBasicVisuals
      muzzleFlash:
        sprite: _SD/Mobs/Replicator/replicator_gun.rsi
        state: muzzle_repli
      travelFlash:
        sprite: _SD/Mobs/Replicator/replicator_gun.rsi
        state: beam_repli
      impactFlash:
        sprite: _SD/Mobs/Replicator/replicator_gun.rsi
        state: impact_repli
    - type: HitscanBasicEffects

- type: entity
  id: ReplicatorT2Hitscan
  parent: BasicHitscan
  categories: [ HideSpawnMenu ]
  components:
    - type: HitscanBasicDamage
      damage:
        types:
          Shock: 18
    - type: HitscanBasicVisuals
      muzzleFlash:
        sprite: _SD/Mobs/Replicator/replicator_gun.rsi
        state: muzzle_repli2
      travelFlash:
        sprite: _SD/Mobs/Replicator/replicator_gun.rsi
        state: beam_repli2
      impactFlash:
        sprite: _SD/Mobs/Replicator/replicator_gun.rsi
        state: impact_repli2
    - type: HitscanBasicEffects

- type: startingGear
  id: StartingGearReplicatorQueen
  inhand:
    - PinpointerReplicatorUnremoveable

- type: startingGear
  id: StartingGearReplicatorTools
  inhand:
    - OmnitoolUnremoveable
    - WelderExperimentalUnremoveable
  equipment:
    pocket1: PinpointerReplicatorUnremoveable

- type: startingGear
  id: StartingGearReplicatorT2Alt
  inhand:
    - ReplicatorT2AltWeapon
    - ReplicatorT2AltMeleeWeapon
  equipment:
    pocket1: PinpointerReplicatorUnremoveable

- type: startingGear
  id: StartingGearReplicatorT1Weapon
  inhand:
    - ReplicatorT1Weapon
  equipment:
    pocket1: PinpointerReplicatorUnremoveable

- type: startingGear
  id: StartingGearReplicatorT3Weapon
  inhand:
    - ReplicatorT3Weapon
  equipment:
    pocket1: PinpointerReplicatorUnremoveable

- type: entity
  id: ReplicatorT3Weapon
  parent: BaseItem
  name: protector arm
  description: You are a weapon.
  categories: [ HideSpawnMenu ]
  components:
    - type: Tag
      tags:
        - Pickaxe
    - type: Sprite
      sprite: /Textures/_SD/Mobs/Replicator/replicator.rsi
      state: t3weapon
    - type: MeleeWeapon
      attackRate: 0.5
      wideAnimationRotation: 180
      soundHit:
        path: "/Audio/Effects/metal_slam4.ogg"
      animation: WeaponArcSlash
      damage:
        types:
          Blunt: 22
          Shock: 8
          Structural: 45
    - type: Unremoveable
    - type: Prying
      pryPowered: true
      force: true
      speedModifier: 1
      useSound:
        path: /Audio/Items/crowbar.ogg

- type: entity
  id: ReplicatorT1Weapon
  parent: BaseItem
  name: replicator stun projector
  description: You will protect the nest.
  suffix: Unremoveable
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: /Textures/_SD/Mobs/Replicator/replicator.rsi
      layers:
        - state: t1weapon
          map: ["enum.GunVisualLayers.Base"]
    - type: Icon
      sprite: /Textures/_SD/Mobs/Replicator/replicator.rsi
      state: t1weapon
    - type: Appearance
    - type: Gun
      fireRate: 0.3
      soundGunshot:
        path: /Audio/_SD/Weapons/Guns/Gunshots/stunprojector.ogg
    - type: HitscanBatteryAmmoProvider
      proto: ReplicatorT1Hitscan
      fireCost: 10
    - type: Battery
      maxCharge: 150
      startingCharge: 150
    - type: BatterySelfRecharger
      autoRecharge: true
      autoRechargeRate: 100
    - type: Prying
      pryPowered: true
      force: true
      speedModifier: 1
      useSound:
        path: /Audio/Items/crowbar.ogg
    - type: Unremoveable

- type: entity
  id: ReplicatorT2AltWeapon
  name: defender stun projector
  parent: ReplicatorT1Weapon
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: /Textures/_SD/Mobs/Replicator/replicator.rsi
      layers:
        - state: t2altweapon
          map: ["enum.GunVisualLayers.Base"]
    - type: Icon
      sprite: /Textures/_SD/Mobs/Replicator/replicator.rsi
      state: t2altweapon
    - type: Gun
      fireRate: 0.3
      soundGunshot:
        path: /Audio/_SD/Weapons/Guns/Gunshots/stunprojector.ogg
    - type: HitscanBatteryAmmoProvider
      proto: ReplicatorT2Hitscan
      fireCost: 10
    - type: Battery
      maxCharge: 150
      startingCharge: 150
    - type: BatterySelfRecharger
      autoRecharge: true
      autoRechargeRate: 100

- type: entity
  id: ReplicatorT2AltMeleeWeapon
  parent: ReplicatorT3Weapon
  name: defender whip
  description: You are a weapon.
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      sprite: /Textures/_SD/Mobs/Replicator/replicator.rsi
      state: t2altmelee
    - type: MeleeWeapon
      attackRate: 1.2
      wideAnimationRotation: 180
      soundHit:
        collection: MetalThud
      animation: WeaponArcSlash
      damage:
        types:
          Blunt: 7
          Shock: 7
          Structural: 15

- type: entity
  parent: PinpointerBase
  id: PinpointerReplicator
  name: internal gyroscope
  suffix: ReplicatorNest
  description: Locates the Nest.
  components:
    - type: Sprite
      sprite: /Textures/_SD/Objects/Devices/pinpointer.rsi
      layers:
        - sprite: /Textures/_SD/Objects/Devices/pinpointer_replicator.rsi
          state: pinpointer-replicator
          map: ["enum.PinpointerLayers.Base"]
        - state: pinonnull
          map: ["enum.PinpointerLayers.Screen"]
          shader: unshaded
          visible: false
    - type: Icon
      sprite: /Textures/_SD/Objects/Devices/pinpointer_replicator.rsi
      state: pinpointer-replicator
    - type: Pinpointer
      component: ReplicatorNest
      targetName: replicator nest

- type: entity
  parent: PinpointerReplicator
  id: PinpointerReplicatorUnremoveable
  categories: [HideSpawnMenu]
  components:
    - type: Unremoveable
